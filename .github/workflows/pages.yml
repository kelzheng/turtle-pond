# Deploys static site (index.html, css/, js/) to GitHub Pages.
# If this never runs: Repo Settings → Actions → General → allow Actions;
#   Settings → Pages → Build and deployment → Source: GitHub Actions.
# Manual run: Actions → "Deploy GitHub Pages" → Run workflow.

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare site bundle
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -R css js _site/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
